name: Run XPLA E2E Tests (cosmock)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  cosmock-e2e:
    runs-on: ubuntu-latest
    env:
      XPLA_VERSION: v1.9.0
      GAIA_VERSION: v27.0.0
      HERMES_VERSION: v1.13.3

    steps:
      - name: Checkout Repository 📝
        uses: actions/checkout@v4

      - name: Setup and Build
        uses: ./.github/actions/setup-build

      - name: Install xplad (prebuilt from xpladev/xpla)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${XPLA_VERSION}" --repo xpladev/xpla \
            --pattern "xpla_*_Linux_x86_64.tar.gz" --dir /tmp
          tar -xzf /tmp/xpla_*_Linux_x86_64.tar.gz -C /tmp
          sudo mv /tmp/xplad /usr/local/bin/xplad
          sudo chmod +x /usr/local/bin/xplad
          xplad version

      - name: Install gaiad (prebuilt)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${GAIA_VERSION}" --repo cosmos/gaia \
            --pattern "gaiad-${GAIA_VERSION}-linux-amd64" --dir /tmp
          sudo mv "/tmp/gaiad-${GAIA_VERSION}-linux-amd64" /usr/local/bin/gaiad
          sudo chmod +x /usr/local/bin/gaiad
          gaiad version

      - name: Install hermes (prebuilt)
        run: |
          curl -fsSL \
            "https://github.com/informalsystems/hermes/releases/download/${HERMES_VERSION}/hermes-${HERMES_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar xz -C /usr/local/bin hermes
          hermes version

      - name: Run cosmock E2E Tests
        run: pnpm test:cosmock
